[opcache]
; Ensure OPcache is loaded and enabled
zend_extension=opcache.so
opcache.enable=1

; Enable OPcache for the CLI (helpful for Drush, Artisan, or cron jobs)
opcache.enable_cli=1

; Allocate memory for the JIT buffer (e.g., 100 Megabytes)
; If this is set to 0, JIT is effectively disabled
opcache.jit_buffer_size=100M

; Set the JIT mode. "tracing" is generally the most performant for web apps
opcache.jit=tracing

