name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release (for example 1.0.0)
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG_NAME: v${{ inputs.version }}
      RELEASE_NAME: Kavlo CMS v${{ inputs.version }}
      ARCHIVE_NAME: kavlo-cms-${{ inputs.version }}.zip

    steps:
      - name: Validate branch
        if: github.ref_name != 'main'
        run: |
          echo "Releases must be created from the main branch."
          exit 1

      - name: Validate version format
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be a semantic version like 1.0.0 or 1.0.0-rc.1"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: sqlite3, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run release checks
        run: |
          composer lint:check
          npm run format:check
          npm run lint:check
          npm run types:check
          npm run build
          ./vendor/bin/phpunit

      - name: Build release notes
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          tag = os.environ["TAG_NAME"]
          archive = os.environ["ARCHIVE_NAME"]
          changelog = pathlib.Path("CHANGELOG.md")
          body = ""

          if changelog.exists():
              text = changelog.read_text()
              for heading in (version, "Unreleased"):
                  match = re.search(
                      rf"^## \[{re.escape(heading)}\]\n(?P<body>.*?)(?=^## \[|\Z)",
                      text,
                      re.MULTILINE | re.DOTALL,
                  )
                  if match:
                      body = match.group("body").strip()
                      break

          notes = [f"# {tag}", ""]

          if body:
              notes.append(body)
          else:
              notes.append("Release package generated by GitHub Actions.")

          notes.extend(
              [
                  "",
                  "## Assets",
                  f"- `{archive}`",
                  f"- `{archive}.sha256`",
                  "",
              ]
          )

          pathlib.Path("dist/release-notes.md").write_text("\n".join(notes))
          PY

      - name: Build release archive
        run: |
          mkdir -p "dist/package/kavlo-cms-${VERSION}"
          rsync -a ./ "dist/package/kavlo-cms-${VERSION}/" \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.phpunit.cache' \
            --exclude '.phpunit.result.cache' \
            --exclude 'auth.json' \
            --exclude 'bootstrap/ssr' \
            --exclude 'dist' \
            --exclude 'node_modules' \
            --exclude 'public/hot' \
            --exclude 'public/storage' \
            --exclude 'storage/*.key' \
            --exclude 'storage/debugbar' \
            --exclude 'storage/logs' \
            --exclude 'storage/pail' \
            --exclude 'vendor'
          (
            cd dist/package
            zip -qr "../${ARCHIVE_NAME}" "kavlo-cms-${VERSION}"
          )
          sha256sum "dist/${ARCHIVE_NAME}" > "dist/${ARCHIVE_NAME}.sha256"

      - name: Create and push tag
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.TAG_NAME }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
            dist/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: dist/release-notes.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.ARCHIVE_NAME }}.sha256
