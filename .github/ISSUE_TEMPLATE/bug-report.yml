name: Bug report
description: Report a reproducible problem in Kavlo CMS.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        For security issues, please do not open a public issue. Follow the reporting guidance in `SECURITY.md`.
  - type: input
    id: version
    attributes:
      label: Version
      description: What Kavlo CMS version, commit, or branch are you testing?
      placeholder: "1.2.0 / main / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you seeing the issue?
      options:
        - Local development
        - Lando
        - CI
        - Production
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact.
      placeholder: A short summary of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Save ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs, screenshots, or stack traces
      description: Paste anything that will help diagnose the issue.
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add links, related issues, or setup details that might matter.
