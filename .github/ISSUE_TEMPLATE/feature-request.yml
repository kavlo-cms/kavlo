name: Feature request
description: Suggest a product or developer-experience improvement for Kavlo CMS.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Please keep requests focused on the problem and the desired outcome so they are easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation or workflow pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: Describe the behavior, UI, API, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What are you doing today, and why is it not enough?
  - type: textarea
    id: scope
    attributes:
      label: Affected areas
      description: Which parts of the CMS would this touch?
      placeholder: Pages, builder, themes, plugins, admin UX, deployment, docs, etc.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add examples, references, screenshots, or linked discussions.
